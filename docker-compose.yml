# Определяем наши сервисы (контейнеры)
services:

  # Сервис №1: Веб-приложение Nuxt
  web:
    build:
      # Указываем, где искать Dockerfile (в текущей папке - ".")
      context: .
      dockerfile: Dockerfile
    ports:
      # Пробрасываем порт 3000 из контейнера на ваш компьютер,
      # чтобы вы могли открыть сайт в браузере по localhost:3000
      - "3000:3000"
    environment:
      # Явно указываем переменные окружения
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - NUXT_PUBLIC_TELEGRAM_APP_URL=${NUXT_PUBLIC_TELEGRAM_APP_URL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
    env_file:
      # Подключаем файл с переменными окружения
      - .env
    restart: unless-stopped
    # Убираем healthcheck для Timeweb.cloud
    # healthcheck:
    #   test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 40s
    # depends_on:
    #   - bot

  # Сервис №2: Telegram-бот
  bot:
    build:
      # Указываем, что Dockerfile для этого сервиса лежит в папке ./telegram_bot
      context: ./telegram_bot
      dockerfile: Dockerfile
    environment:
      # Явно указываем переменные окружения для бота
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    env_file:
      # Бот тоже будет использовать переменные из этого файла
      - .env
    restart: unless-stopped
    # Убираем healthcheck для Timeweb.cloud
    # healthcheck:
    #   test: ["CMD", "pgrep", "-f", "bot.py"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 20s